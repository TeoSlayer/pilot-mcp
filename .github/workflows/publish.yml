name: publish

# Triggered on tag pushes (semver). Publishes to npm, Official MCP Registry,
# and triggers the Docker MCP catalog rebuild. OIDC verifies our namespace.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci --omit=optional
      # TODO: build platform subpackages here, publish each, then the main.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  mcp-registry-publish:
    runs-on: ubuntu-latest
    needs: npm-publish
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: npm install -g @modelcontextprotocol/mcp-publisher
      - name: Publish to Official MCP Registry
        run: mcp-publisher publish server.json
        env:
          # OIDC token verifies the io.github.<user>/* namespace.
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}

  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/teoslayer/pilot-mcp:latest
            ghcr.io/teoslayer/pilot-mcp:${{ github.ref_name }}
          provenance: true
          sbom: true
